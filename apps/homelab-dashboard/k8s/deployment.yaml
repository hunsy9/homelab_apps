apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelab-dashboard
  template:
    metadata:
      labels:
        app: homelab-dashboard
    spec:
      serviceAccountName: homelab-dashboard
      containers:
      - name: homelab-dashboard
        image: harbor.seung.site/homelab/homelab-dashboard:c4a00ecd3735a6e3a05ceb64366c306d60e0e655
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
