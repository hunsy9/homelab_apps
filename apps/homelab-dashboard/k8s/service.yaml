apiVersion: v1
kind: Service
metadata:
  name: homelab-dashboard
  namespace: default
spec:
  selector:
    app: homelab-dashboard
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homelab-dashboard
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`homelab.seung.site`)
      kind: Rule
      services:
        - name: homelab-dashboard
          port: 80
