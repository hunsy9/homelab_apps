name: Build and Push homelab-dashboard

on:
  push:
    paths:
      - 'apps/homelab-dashboard/**'
      - '!apps/homelab-dashboard/k8s/**'
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: homelab-dashboard
  REGISTRY: harbor.seung.site
  PROJECT: homelab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build image
        run: |
          cd apps/homelab-dashboard
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:latest

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:latest

      - name: Update deployment manifest
        run: |
          sed -i "s|image: harbor.seung.site/homelab/homelab-dashboard:.*|image: harbor.seung.site/homelab/homelab-dashboard:${{ github.sha }}|" apps/homelab-dashboard/k8s/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/homelab-dashboard/k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: Update homelab-dashboard image to ${{ github.sha }}"
          git push
